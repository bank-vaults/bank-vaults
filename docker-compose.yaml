services:
  vault:
    container_name: bank-vaults-vault
    image: hashicorp/vault:2.0.1
    ports:
      - 127.0.0.1:8200:8200
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_TOKEN: 227e1cce-6bf7-30bb-2d2a-acc854318caf
      VAULT_DEV_ROOT_TOKEN_ID: 227e1cce-6bf7-30bb-2d2a-acc854318caf
